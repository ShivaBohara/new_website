<!-- ============================================================
     machine.html  — MACHINE DETAIL PAGE
     ============================================================
     HOW TO ADD A NEW MACHINE:
     1. Scroll to the "MACHINE DATA" section below
     2. Copy any existing machine block (e.g. fastfood)
     3. Give it a new key name (e.g. "sanitarypad")
     4. Fill in: name, tag, description, image, specs[], useCases[]
     5. In the header nav (and in index.html/shop.html navs),
        add: <a href="machine.html?type=sanitarypad">Your Machine</a>
     That's it — the page renders automatically from the data.
     ============================================================ -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine | Jigu Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>

        /* ── DARK HERO SECTION ── */
        .machine-hero-wrap {
            background: #111;
        }
        .machine-hero {
            color: white;
            padding: 80px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }
        .machine-hero h1 {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        .machine-hero p {
            color: rgba(255,255,255,0.75);
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .machine-tag {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cc0000;
            display: block;
            margin-bottom: 12px;
        }
        .machine-hero-img {
            border-radius: 16px;
            overflow: hidden;
            height: 460px;
            background: #222;
        }
        .machine-hero-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .machine-btn {
            display: inline-block;
            background: #cc0000;
            color: white;
            padding: 14px 36px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            border: none;
        }
        .machine-btn:hover { background: #aa0000; }

        /* ── SPECIFICATIONS ── */
        .specs-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 40px;
        }
        .specs-section h2 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }
        .spec-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 28px;
        }
        .spec-card h3 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cc0000;
            margin-bottom: 8px;
        }
        .spec-card p {
            font-size: 1.1rem;
            font-weight: 700;
            color: #222;
        }

        /* ── USE CASES ── */
        .use-cases { margin-bottom: 60px; }
        .use-cases h2 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .use-cases-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .use-case-item {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .use-case-item h4 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .use-case-item p {
            font-size: 0.82rem;
            color: #666;
        }

        /* ── CALL TO ACTION ── */
        .cta-section {
            background: #cc0000;
            color: white;
            text-align: center;
            padding: 60px 40px;
        }
        .cta-section h2 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
        }
        .cta-section p {
            opacity: 0.85;
            margin-bottom: 32px;
            font-size: 1rem;
        }
        .cta-btn {
            background: white;
            color: #cc0000;
            padding: 16px 40px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .cta-btn:hover { background: #f5f5f5; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .machine-hero       { grid-template-columns: 1fr; padding: 40px 20px; }
            .specs-grid         { grid-template-columns: 1fr 1fr; }
            .use-cases-grid     { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════════ -->
<header class="site-header">
    <div class="nav-top-row">
        <button class="icon-btn" onclick="history.back()">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
        </button>
        <a href="../index.html" class="brand">
            <img src="../assets/images/logo/jigu store logo.jpg" alt="Jigu Store Logo" class="brand-logo">
            <span>Jigu Store</span>
        </a>
        <div class="nav-icons">
            <button class="icon-btn cart-icon-btn" aria-label="Cart" onclick="window.location.href='cart.html'">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                </svg>
            </button>
        </div>
    </div>
    <nav class="site-nav">
        <a href="../index.html">Home</a>
        <a href="shop.html">Products</a>
        <!-- Machines dropdown — TO ADD NEW MACHINE: add <a> here and in MACHINE DATA below -->
        <div class="nav-item has-dropdown">
            <a href="#" class="active">Machines</a>
            <div class="dropdown-panel">
                <!-- ▼ ADD NEW MACHINE MENU LINK HERE ▼ -->
                <a href="machine.html?type=fastfood">Fast Food Vending Machine</a>
                <a href="machine.html?type=coffee">Coffee Vending Machine</a>
                <a href="machine.html?type=softdrink">Soft Drink Vending Machine</a>
                <a href="machine.html?type=sanitarypad">Sanitary Pad Vending Machine</a>
                <!-- ▲ ADD NEW MACHINE MENU LINK HERE ▲ -->
            </div>
        </div>
        <a href="../index.html#contact">Contact</a>
    </nav>
</header>

<!-- ════════════════════════════════════════════════
     MACHINE CONTENT  (filled by JavaScript below)
     ════════════════════════════════════════════════ -->
<div id="machineContent">
    <!-- JavaScript renders this based on ?type= in the URL -->
</div>

<!-- ════════════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════════════ -->
<script>

/* ══════════════════════════════════════════════════
   ▼▼▼  MACHINE DATA  ▼▼▼
   ══════════════════════════════════════════════════
   HOW TO ADD A NEW MACHINE:
   ─────────────────────────
   1. Copy one block below (e.g. fastfood)
   2. Change the key name (e.g. "sanitarypad")
   3. Fill in all the fields
   4. Add a menu link in the <nav> above:
      <a href="machine.html?type=sanitarypad">Your Machine</a>
   5. Also add the same link in index.html and shop.html navs
   ══════════════════════════════════════════════════ */

const MACHINES = {

    /* ── MACHINE: FAST FOOD ──────────────────────────
       URL: machine.html?type=fastfood
       ─────────────────────────────────────────────── */
    fastfood: {
        name:        'Fast Food Vending Machine',
        tag:         'Hot Food',
        description: 'Hot meals available 24/7 without any staff. Designed for high-traffic locations including hospitals, campuses, and large office buildings across Nepal. Supports all major digital payment methods.',
        image:       '../assets/images/machine/fast_food_vending_machine.png',
        specs: [
            { label: 'Capacity',     value: 'Up to 40 items' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Temperature',  value: 'Heated compartments' },
            { label: 'Screen',       value: '10 inch touchscreen' },
            { label: 'Power',        value: '220V AC standard' },
            { label: 'Connectivity', value: '4G + WiFi' }
        ],
        useCases: [
            { place: 'Hospitals',  desc: 'Night shift staff meals' },
            { place: 'Campuses',   desc: 'Student canteen support' },
            { place: 'Offices',    desc: 'Quick lunch access' },
            { place: 'Factories',  desc: '24hr worker meals' }
        ]
    },

    /* ── MACHINE: COFFEE ─────────────────────────────
       URL: machine.html?type=coffee
       ─────────────────────────────────────────────── */
    coffee: {
        name:        'Coffee Vending Machine',
        tag:         'Hot Beverages',
        description: 'Freshly brewed coffee on demand. Bring cafe-quality beverages to offices, hospitals, and campuses without needing a barista. Multiple drink options in one machine.',
        image:       '../assets/images/machine/coffee_vending_machine.png',
        specs: [
            { label: 'Varieties',    value: '8+ coffee types' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Temperature',  value: 'Hot and cold' },
            { label: 'Screen',       value: '7 inch touchscreen' },
            { label: 'Capacity',     value: '200 cups per refill' },
            { label: 'Connectivity', value: 'WiFi monitoring' }
        ],
        useCases: [
            { place: 'Offices',     desc: 'Morning coffee routine' },
            { place: 'Hotels',      desc: 'Guest refreshments' },
            { place: 'Hospitals',   desc: 'Waiting area service' },
            { place: 'Coworkings',  desc: 'All-day coffee access' }
        ]
    },

    /* ── MACHINE: SOFT DRINK ─────────────────────────
       URL: machine.html?type=softdrink
       ─────────────────────────────────────────────── */
    softdrink: {
        name:        'Soft Drink Vending Machine',
        tag:         'Cold Drinks',
        description: 'Keep drinks cold and accessible around the clock. Designed for high-traffic locations across Nepal. Supports all major digital payment methods including eSewa, Khalti, and FonePay.',
        image:       '../assets/images/machine/soft_drink_vending_machine.png',
        specs: [
            { label: 'Capacity',     value: 'Up to 60 bottles' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Temperature',  value: '3°C to 10°C cooling' },
            { label: 'Screen',       value: '7 inch touchscreen' },
            { label: 'Power',        value: '220V AC standard' },
            { label: 'Connectivity', value: '4G + WiFi' }
        ],
        useCases: [
            { place: 'Schools',  desc: 'Student refreshments' },
            { place: 'Gyms',     desc: 'Post-workout drinks' },
            { place: 'Events',   desc: 'Crowd refreshments' },
            { place: 'Offices',  desc: 'All-day cold drinks' }
        ]
    },

    /* ── MACHINE: SANITARY PAD ───────────────────────
       URL: machine.html?type=sanitarypad
       ─────────────────────────────────────────────── */
    sanitarypad: {
        name:        'Sanitary Pad Vending Machine',
        tag:         'Health & Hygiene',
        description: 'Hygienic and discreet sanitary pad dispensing for schools, colleges, hospitals, and public spaces across Nepal. Supports cashless payment and remote monitoring.',
        image:       '../assets/images/category/Easy_to_use.png',
        specs: [
            { label: 'Capacity',     value: 'Up to 100 pads' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Design',       value: 'Discreet dispensing' },
            { label: 'Screen',       value: '5 inch touchscreen' },
            { label: 'Power',        value: '220V AC standard' },
            { label: 'Connectivity', value: 'WiFi monitoring' }
        ],
        useCases: [
            { place: 'Schools',    desc: 'Accessible for students' },
            { place: 'Colleges',   desc: 'Campus hygiene support' },
            { place: 'Hospitals',  desc: 'Patient convenience' },
            { place: 'Offices',    desc: 'Workplace wellness' }
        ]
    },

    /* ── ADD NEW MACHINE HERE ───────────────────────
       Copy the block below, remove the comment marks,
       and fill in your details:

    yourmachinekey: {
        name:        'Your Machine Name',
        tag:         'Category Label',
        description: 'Your machine description here.',
        image:       '../assets/images/machine/your-machine.png',
        specs: [
            { label: 'Capacity',     value: 'X items' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Screen',       value: 'X inch touchscreen' },
            { label: 'Power',        value: '220V AC' },
            { label: 'Connectivity', value: 'WiFi + 4G' },
            { label: 'Custom Spec',  value: 'Value here' }
        ],
        useCases: [
            { place: 'Location 1', desc: 'Use case description' },
            { place: 'Location 2', desc: 'Use case description' },
            { place: 'Location 3', desc: 'Use case description' },
            { place: 'Location 4', desc: 'Use case description' }
        ]
    },
    ─────────────────────────────────────────────────── */

};

/* ══════════════════════════════════════════════════
   ▲▲▲  END OF MACHINE DATA  ▲▲▲
   ══════════════════════════════════════════════════ */


/* ── READ MACHINE TYPE FROM URL ─── */
function getMachineType() {
    const params = new URLSearchParams(window.location.search);
    return params.get('type') || 'fastfood';
}

/* ── BUILD THE PAGE ─── */
function renderMachine() {
    const type    = getMachineType();
    const machine = MACHINES[type];

    if (!machine) {
        document.getElementById('machineContent').innerHTML =
            '<p style="text-align:center;padding:80px;color:#999;">Machine not found.</p>';
        return;
    }

    document.title = machine.name + ' | Jigu Store';

    document.getElementById('machineContent').innerHTML = `

        <!-- HERO -->
        <div class="machine-hero-wrap">
            <div class="machine-hero">
                <div>
                    <span class="machine-tag">${machine.tag}</span>
                    <h1>${machine.name}</h1>
                    <p>${machine.description}</p>
                    <button class="machine-btn" onclick="window.location.href='../index.html#contact'">
                        Request a Demo
                    </button>
                </div>
                <div class="machine-hero-img">
                    <img src="${machine.image}" alt="${machine.name}">
                </div>
            </div>
        </div>

        <!-- SPECIFICATIONS -->
        <div class="specs-section">
            <h2>Specifications</h2>
            <div class="specs-grid">
                ${machine.specs.map(s => `
                    <div class="spec-card">
                        <h3>${s.label}</h3>
                        <p>${s.value}</p>
                    </div>
                `).join('')}
            </div>

            <!-- WHERE IT WORKS BEST -->
            <div class="use-cases">
                <h2>Where It Works Best</h2>
                <div class="use-cases-grid">
                    ${machine.useCases.map(u => `
                        <div class="use-case-item">
                            <h4>${u.place}</h4>
                            <p>${u.desc}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>

        <!-- CALL TO ACTION -->
        <div class="cta-section">
            <h2>Interested in the ${machine.name}?</h2>
            <p>Contact us for pricing, installation, and a live demo in Nepal.</p>
            <button class="cta-btn" onclick="window.location.href='../index.html#contact'">
                Contact Us
            </button>
        </div>
    `;
}

/* ── INIT ─── */
renderMachine();
</script>
</body>
</html>
