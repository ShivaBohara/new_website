<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine | Jigu Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .machine-page { background: #111; }
        .machine-hero {
            color: white;
            padding: 80px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }
        .machine-hero h1 {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        .machine-hero p {
            color: rgba(255,255,255,0.75);
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .machine-tag {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cc0000;
            display: block;
            margin-bottom: 12px;
        }
        .machine-hero-img {
            border-radius: 16px;
            overflow: hidden;
            height: 460px;
            background: #222;
        }
        .machine-hero-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .machine-btn {
            display: inline-block;
            background: #cc0000;
            color: white;
            padding: 14px 36px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            border: none;
        }
        .machine-btn:hover { background: #aa0000; }
        .specs-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 40px;
        }
        .specs-section h2 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }
        .spec-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 28px;
        }
        .spec-card h3 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cc0000;
            margin-bottom: 8px;
        }
        .spec-card p {
            font-size: 1.1rem;
            font-weight: 700;
            color: #222;
        }
        .use-cases {
            margin-bottom: 60px;
        }
        .use-cases h2 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .use-cases-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .use-case-item {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .use-case-item h4 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .use-case-item p {
            font-size: 0.82rem;
            color: #666;
        }
        .cta-section {
            background: #cc0000;
            color: white;
            text-align: center;
            padding: 60px 40px;
        }
        .cta-section h2 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
        }
        .cta-section p {
            opacity: 0.85;
            margin-bottom: 32px;
            font-size: 1rem;
        }
        .cta-btn {
            background: white;
            color: #cc0000;
            padding: 16px 40px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        @media (max-width: 768px) {
            .machine-hero { grid-template-columns: 1fr; padding: 40px 20px; }
            .specs-grid { grid-template-columns: 1fr 1fr; }
            .use-cases-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
    <div class="nav-top-row">
        <button class="icon-btn" onclick="history.back()">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
        </button>
        <a href="../index.html" class="brand">
            <img src="../assets/images/logo/jigu store logo.jpg" alt="Jigu Store Logo" class="brand-logo">
            <span>Jigu Store</span>
        </a>
        <div class="nav-icons">
            <button class="icon-btn" onclick="window.location.href='cart.html'">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                </svg>
            </button>
        </div>
    </div>
    <nav class="site-nav">
        <a href="../index.html">Home</a>
        
         <!-- MACHINES dropdown -->
    <div class="nav-item has-dropdown">
        <a href="#">Machines</a>

        <div class="dropdown-panel">
            <a href="machine.html?type=fastfood">
                Fast Food Vending Machine
            </a>

            <a href="machine.html?type=coffee">
                Coffee Vending Machine
            </a>

            <a href="machine.html?type=softdrink">
                Soft Drink Vending Machine
            </a>
        </div>
    </div>
        <!-- product dropdown -->
         <div class="nav-item has-dropdown">
        <a href="shop.html">Products</a>
        <div class="dropdown-panel">
            <a href="shop.html">Stem Kits</a>
            <a href="shop.html">Prototype Drones</a>
            <a href="shop.html">Science Kits</a>
            <a href="shop.html">Project Material</a>
        </div>
    </div>
        <a href="../index.html#contact">Contact</a>
    </nav>
</header>

<!-- MACHINE CONTENT — filled by JavaScript -->
<div id="machineContent"></div>

<script>
// ── ALL MACHINE DATA IN ONE PLACE ─────────────────
// When you get real photos, just update the image paths here
const machines = {

    fastfood: {
        name: 'Fast Food Vending Machine',
        tag: 'Hot Food',
        description: 'Hot meals available 24/7 without any staff. Designed for high-traffic locations including hospitals, campuses, and large office buildings across Nepal. Supports all major digital payment methods.',
        image: '../assets/images/machine/fast_food_vending_machine.png',
        productId: 4,
        specs: [
            { label: 'Capacity',     value: 'Up to 40 items' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Temperature',  value: 'Heated compartments' },
            { label: 'Screen',       value: '10 inch touchscreen' },
            { label: 'Power',        value: '###V AC standard' },
            { label: 'Connectivity', value: '4G + WiFi ###' }
        ],
        useCases: [
            { place: 'Hospitals',   desc: 'Night shift staff meals' },
            { place: 'Campuses',    desc: 'Student canteen support' },
            { place: 'Offices',     desc: 'Quick lunch access' },
            { place: 'Factories',   desc: '24hr worker meals' }
        ]
    },

    coffee: {
        name: 'Coffee Vending Machine',
        tag: 'Hot Beverages',
        description: 'Freshly brewed coffee on demand. Bring cafe-quality beverages to offices, hospitals, and campuses without needing a barista. Multiple drink options in one machine.',
        image: '../assets/images/machine/coffee_vending_machine.png',
        productId: 3,
        specs: [
            { label: 'Varieties',    value: '#+ coffee types' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Temperature',  value: 'Hot and cold' },
            { label: 'Screen',       value: '# inch touchscreen' },
            { label: 'Capacity',     value: '### cups per refill' },
            { label: 'Connectivity', value: 'WiFi monitoring' }
        ],
        useCases: [
            { place: 'Offices',     desc: 'Morning coffee routine' },
            { place: 'Hotels',      desc: 'Guest refreshments' },
            { place: 'Hospitals',   desc: 'Waiting area service' },
            { place: 'Coworkings',  desc: 'All-day coffee access' }
        ]
    },

    softdrink: {
        name: 'Soft Drink Vending Machine',
        tag: 'Cold Drinks',
        description: 'Keep drinks cold and accessible around the clock. Designed for high-traffic locations across Nepal. Supports all major digital payment methods including eSewa, Khalti, and FonePay.',
        image: '../assets/images/machine/soft_drink_vending_machine.png',
        productId: 2,
        specs: [
            { label: 'Capacity',     value: 'Up to ## bottles' },
            { label: 'Payment',      value: 'QR / Card / Cash' },
            { label: 'Temperature',  value: '#°C to ##°C cooling' },
            { label: 'Screen',       value: '# inch touchscreen' },
            { label: 'Power',        value: '###V AC standard' },
            { label: 'Connectivity', value: '4G + WiFi ' }
        ],
        useCases: [
            { place: 'Schools',     desc: 'Student refreshments' },
            { place: 'Gyms',        desc: 'Post-workout drinks' },
            { place: 'Events',      desc: 'Crowd refreshments' },
            { place: 'Offices',     desc: 'All-day cold drinks' }
        ]
    }
};

// ── READ URL PARAMETER ────────────────────────────
function getMachineType() {
    const params = new URLSearchParams(window.location.search);
    return params.get('type') || 'fastfood';
}

// ── BUILD THE PAGE ────────────────────────────────
function renderMachine() {
    const type = getMachineType();
    const m = machines[type];

    if (!m) {
        document.getElementById('machineContent').innerHTML =
            '<p style="text-align:center;padding:80px;">Machine not found.</p>';
        return;
    }

    // Update page title
    document.title = m.name + ' | Jigu Store';

    document.getElementById('machineContent').innerHTML = `

        <!-- HERO -->
        <div class="machine-page">
            <div class="machine-hero">
                <div>
                    <span class="machine-tag">${m.tag}</span>
                    <h1>${m.name}</h1>
                    <p>${m.description}</p>
                    <button class="machine-btn"
                        onclick="window.location.href='product.html?id=${m.productId}'">
                        View Pricing and Buy
                    </button>
                </div>
                <div class="machine-hero-img">
                    <img src="${m.image}" alt="${m.name}">
                </div>
            </div>
        </div>

        <!-- SPECS -->
        <div class="specs-section">
            <h2>Specifications</h2>
            <div class="specs-grid">
                ${m.specs.map(s => `
                    <div class="spec-card">
                        <h3>${s.label}</h3>
                        <p>${s.value}</p>
                    </div>
                `).join('')}
            </div>

            <!-- USE CASES -->
            <div class="use-cases">
                <h2>Where It Works Best</h2>
                <div class="use-cases-grid">
                    ${m.useCases.map(u => `
                        <div class="use-case-item">
                            <h4>${u.place}</h4>
                            <p>${u.desc}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>

         <!-- CTA -->
        <div class="cta-section">
            <h2>Interested in the ${m.name}?</h2>
            <p>Contact us for pricing, installation, and demo in Nepal.</p>
            <button class="cta-btn"
                onclick="window.location.href='../index.html#contact'">
                Contact Us
            </button>
        </div>
    `;
}

renderMachine();
</script>
</body>
</html>
