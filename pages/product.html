<!-- ============================================================
     product.html  — PRODUCT DETAIL PAGE
     ============================================================
     HOW TO ADD A NEW PRODUCT:
     1. Scroll to the "PRODUCT DATA" section below
     2. Copy any existing product block (e.g. product 1)
     3. Paste it, give it the next ID number (e.g. 5)
     4. Fill in: name, category, price, image path, description, features[]
     5. In shop.html, add a new <article> card that links to product.html?id=5
     That's it — the page renders automatically from the data.
     ============================================================ -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Jigu Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>

        /* ── PAGE LAYOUT ── */
        .product-detail {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        /* ── IMAGE PANEL ── */
        .product-detail-img {
            background: #f0f0f0;
            border-radius: 16px;
            overflow: hidden;
            height: 460px;
        }
        .product-detail-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── INFO PANEL ── */
        .product-detail-info {
            position: sticky;
            top: 20px;
        }
        .product-tag {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #cc0000;
            margin-bottom: 12px;
            display: block;
        }
        .product-detail-info h1 {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 16px;
        }
        .product-detail-price {
            font-size: 1.8rem;
            font-weight: 900;
            color: #222;
            margin-bottom: 24px;
        }
        .product-detail-desc {
            color: #555;
            line-height: 1.7;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        /* ── FEATURES LIST ── */
        .product-features {
            margin-bottom: 32px;
        }
        .product-features h3 {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
            color: #333;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #444;
        }
        .feature-dot {
            width: 6px;
            height: 6px;
            background: #cc0000;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── ACTION BUTTONS ── */
        .btn-row {
            display: flex;
            gap: 12px;
        }
        .add-cart-btn {
            flex: 1;
            background: #222;
            color: white;
            border: none;
            padding: 16px;
            font-size: 0.9rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: background 200ms;
        }
        .add-cart-btn:hover { background: #cc0000; }

        .buy-now-btn {
            flex: 1;
            background: #cc0000;
            color: white;
            border: none;
            padding: 16px;
            font-size: 0.9rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: background 200ms;
        }
        .buy-now-btn:hover { background: #aa0000; }

        /* ── QR PAYMENT MODAL ── */
        .qr-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .qr-modal.open { display: flex; }
        .qr-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        .qr-box h2 { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; }
        .qr-box p  { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .qr-image {
            width: 200px;
            height: 200px;
            margin: 0 auto 24px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px;
        }
        .qr-image img { width: 100%; height: 100%; }
        .qr-payment-logos {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .qr-payment-logo {
            background: #f5f5f5;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #444;
        }
        .qr-close-btn {
            background: #222;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .product-detail { grid-template-columns: 1fr; gap: 32px; }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════════ -->
<header class="site-header">
    <div class="nav-top-row">
        <button class="icon-btn" aria-label="Back" onclick="history.back()">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
        </button>
        <a href="../index.html" class="brand">
            <img src="../assets/images/logo/jigu store logo.jpg" alt="Jigu Store Logo" class="brand-logo">
            <span>Jigu Store</span>
        </a>
        <div class="nav-icons">
            <button class="icon-btn" aria-label="Sign In" onclick="window.location.href='auth.html'">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </button>
            <button class="icon-btn cart-icon-btn" aria-label="Cart" onclick="window.location.href='cart.html'">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </div>
    <nav class="site-nav">
        <a href="../index.html">Home</a>
        <a href="shop.html" class="active">Products</a>
        <div class="nav-item has-dropdown">
            <a href="#">Machines</a>
            <div class="dropdown-panel">
                <!-- TO ADD A NEW MACHINE MENU ITEM: copy one <a> below and update type= and label -->
                <a href="machine.html?type=fastfood">Fast Food Vending Machine</a>
                <a href="machine.html?type=coffee">Coffee Vending Machine</a>
                <a href="machine.html?type=softdrink">Soft Drink Vending Machine</a>
            </div>
        </div>
        <a href="../index.html#contact">Contact</a>
    </nav>
</header>

<!-- ════════════════════════════════════════════════
     PRODUCT DETAIL  (filled by JavaScript below)
     ════════════════════════════════════════════════ -->
<div class="product-detail" id="productDetail">
    <!-- JavaScript renders this based on ?id= in the URL -->
</div>

<!-- ════════════════════════════════════════════════
     QR PAYMENT MODAL
     ════════════════════════════════════════════════ -->
<div class="qr-modal" id="qrModal">
    <div class="qr-box">
        <h2>Scan to Pay</h2>
        <p id="qrProductName"></p>
        <div class="qr-image">
            <img id="qrCodeImg" src="" alt="QR Code">
        </div>
        <div class="qr-payment-logos">
            <span class="qr-payment-logo">eSewa</span>
            <span class="qr-payment-logo">Khalti</span>
            <span class="qr-payment-logo">FonePay</span>
            <span class="qr-payment-logo">Mobile Banking</span>
        </div>
        <p style="font-size:0.85rem;color:#888;margin-bottom:20px;">
            Scan with any payment app to complete your order
        </p>
        <button class="qr-close-btn" onclick="closeQR()">Close</button>
    </div>
</div>

<!-- ════════════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════════════ -->
<script>

/* ══════════════════════════════════════════════════
   ▼▼▼  PRODUCT DATA  ▼▼▼
   ══════════════════════════════════════════════════
   HOW TO ADD A NEW PRODUCT:
   ─────────────────────────
   Copy the block below (e.g. product 1) and paste
   after the last product. Increment the ID by 1.
   Fill in all the fields and save.

   Then go to shop.html and add a matching card in
   the product grid pointing to product.html?id=<NEW_ID>
   ══════════════════════════════════════════════════ */

const PRODUCTS = {

    /* ── PRODUCT 1 ─────────────────────────────────
       Category: STEM Kits
       ─────────────────────────────────────────────── */
    1: {
        id:          1,
        name:        'STEM Science Kit',
        category:    'STEM Kits',
        price:       'Reveal Soon',            // change to a number like 2500 when ready
        priceIsNum:  false,                    // set true when price is a real number
        image:       '../assets/images/product/STEM Science Kits.jpeg',
        description: 'A complete hands-on STEM science kit designed for students. Covers electronics, circuits, and basic engineering concepts in a fun and engaging way.',
        features: [
            'Covers electronics and circuits',
            'Suitable for ages 10 and above',
            'Step-by-step instruction manual',
            'All components included in box',
            'Aligns with Nepal school curriculum',
            'Great for science projects and fairs'
        ]
    },

    /* ── PRODUCT 2 ─────────────────────────────────
       Category: Prototype Drones
       ─────────────────────────────────────────────── */
    2: {
        id:          2,
        name:        'Prototype Drone Kit',
        category:    'Prototype Drones',
        price:       'Reveal Soon',
        priceIsNum:  false,
        image:       '../assets/images/product/Prototype_drone_kits.jpeg',
        description: 'Build and fly your own drone. This prototype kit teaches aerodynamics, motor control, and basic coding — perfect for engineering enthusiasts and students.',
        features: [
            'Full drone assembly kit',
            'Includes remote controller',
            'Teaches aerodynamics and electronics',
            'Compatible with basic coding modules',
            'Lightweight and durable frame',
            'Guidance video included'
        ]
    },

    /* ── PRODUCT 3 ─────────────────────────────────
       Category: Science Kits
       ─────────────────────────────────────────────── */
    3: {
        id:          3,
        name:        'Science Project Kit',
        category:    'Science Kits',
        price:       'Reveal Soon',
        priceIsNum:  false,
        image:       '../assets/images/product/Science_Project_kits.jpeg',
        description: 'Ready-made science project kits covering biology, chemistry, and physics. Ideal for school fairs, home learning, and group projects.',
        features: [
            'Multiple subject options available',
            'Safety-tested materials',
            'Colour coded components',
            'Detailed project guide inside',
            'Works for both individual and group use',
            'Nepal school syllabus aligned'
        ]
    },

    /* ── PRODUCT 4 ─────────────────────────────────
       Category: Project Material
       ─────────────────────────────────────────────── */
    4: {
        id:          4,
        name:        'Project Material Bundle',
        category:    'Project Material',
        price:       'Reveal Soon',
        priceIsNum:  false,
        image:       '../assets/images/product/Project_Material.jpeg',
        description: 'Everything you need to build school and engineering projects. From wires and sensors to structural materials — all bundled for easy use.',
        features: [
            'Wide variety of components',
            'Wires, sensors, and connectors',
            'Structural craft materials included',
            'Sorted and labelled packaging',
            'Suitable for all grade levels',
            'Reusable components'
        ]
    },

    /* ── ADD NEW PRODUCT HERE ───────────────────────
       Copy the block below, remove the comment marks,
       and fill in your details:

    5: {
        id:          5,
        name:        'Your Product Name',
        category:    'Your Category',
        price:       1500,           // number in NPR, or 'Reveal Soon'
        priceIsNum:  true,           // true if price is a number
        image:       '../assets/images/product/your-image.jpg',
        description: 'Your product description here.',
        features: [
            'Feature one',
            'Feature two',
            'Feature three'
        ]
    },
    ─────────────────────────────────────────────────── */

};

/* ══════════════════════════════════════════════════
   ▲▲▲  END OF PRODUCT DATA  ▲▲▲
   ══════════════════════════════════════════════════ */


/* ── READ PRODUCT ID FROM URL ─── */
function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get('id')) || 1;
}

/* ── FORMAT PRICE ─── */
function formatPrice(product) {
    if (!product.priceIsNum) return product.price;
    return 'NPR ' + Number(product.price).toLocaleString();
}

/* ── RENDER PRODUCT ON PAGE ─── */
function renderProduct() {
    const id      = getProductId();
    const product = PRODUCTS[id];

    if (!product) {
        document.getElementById('productDetail').innerHTML =
            '<p style="padding:80px;text-align:center;color:#999;">Product not found.</p>';
        return;
    }

    document.title = product.name + ' | Jigu Store';

    document.getElementById('productDetail').innerHTML = `
        <div class="product-detail-img">
            <img src="${product.image}" alt="${product.name}">
        </div>
        <div class="product-detail-info">
            <span class="product-tag">${product.category}</span>
            <h1>${product.name}</h1>
            <div class="product-detail-price">${formatPrice(product)}</div>
            <p class="product-detail-desc">${product.description}</p>
            <div class="product-features">
                <h3>Key Features</h3>
                ${product.features.map(f => `
                    <div class="feature-item">
                        <div class="feature-dot"></div>
                        <span>${f}</span>
                    </div>
                `).join('')}
            </div>
            <div class="btn-row">
                <button class="add-cart-btn"
                    onclick="addToCart(${product.id}, '${product.name}', ${product.priceIsNum ? product.price : 0}, '${product.image}')">
                    Add to Cart
                </button>
                <button class="buy-now-btn"
                    onclick="showQR(${product.id}, '${product.name}', ${product.priceIsNum ? product.price : 0})">
                    Buy Now — QR Pay
                </button>
            </div>
        </div>
    `;
}

/* ── CART ─── */
let cart = JSON.parse(localStorage.getItem('jiguCart')) || [];

function updateCartCount() {
    const count  = cart.reduce((t, i) => t + i.quantity, 0);
    const badge  = document.getElementById('cartCount');
    if (badge) {
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }
}

function addToCart(id, name, price, image) {
    const existing = cart.find(i => i.id === id);
    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ id, name, price, image, quantity: 1 });
    }
    localStorage.setItem('jiguCart', JSON.stringify(cart));
    updateCartCount();
    alert('Added to cart!');
}

/* ── QR MODAL ─── */
function showQR(id, name, price) {
    const label = price > 0 ? name + ' — NPR ' + price.toLocaleString() : name;
    document.getElementById('qrProductName').textContent = label;
    const qrData = `Jigu Store Payment - ${name} - NPR ${price}`;
    document.getElementById('qrCodeImg').src =
        `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}`;
    document.getElementById('qrModal').classList.add('open');
}

function closeQR() {
    document.getElementById('qrModal').classList.remove('open');
}

document.getElementById('qrModal').addEventListener('click', function(e) {
    if (e.target === this) closeQR();
});

/* ── INIT ─── */
renderProduct();
updateCartCount();
</script>
</body>
</html>
