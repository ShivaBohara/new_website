<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Jigu Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>

        
      .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: #0a0a0a;
    background-image:
        radial-gradient(circle at 20% 50%, rgba(204, 0, 0, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(204, 0, 0, 0.08) 0%, transparent 40%);
}

.auth-box {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: inline-block;
        }
        .auth-logo span {
            display: block;
            font-size: 1.4rem;
            font-weight: 900;
            color: #cc0000;
            margin-top: 8px;
        }

        /* TABS */
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 32px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 200ms;
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
        }
        .auth-tab.active {
            color: #cc0000;
            border-bottom-color: #cc0000;
        }

        /* FORMS */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #444;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 200ms;
        }
        .form-group input:focus {
            border-color: #cc0000;
        }
        .form-group input.error {
            border-color: #cc0000;
            background: #fff5f5;
        }
        .field-error {
            font-size: 0.8rem;
            color: #cc0000;
            margin-top: 6px;
            display: none;
        }
        .field-error.show { display: block; }

        .submit-btn {
            width: 100%;
            background: #cc0000;
            color: white;
            border: none;
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: background 200ms;
            margin-top: 8px;
        }
        .submit-btn:hover { background: #aa0000; }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* MESSAGE BOX */
        .auth-message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }
        .auth-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .auth-message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .forgot-link {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 20px;
        }
        .forgot-link a {
            font-size: 0.82rem;
            color: #cc0000;
            font-weight: 600;
        }

        .divider {
            text-align: center;
            color: #999;
            font-size: 0.82rem;
            margin: 20px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
    </style>
</head>
<body>

<div class="auth-page">
    <div class="auth-box">

        <!-- Logo -->
        <div class="auth-logo">
            <img src="../assets/images/logo/jigu store logo.jpg" alt="Jigu Store">
            <span>Jigu Store</span>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
            <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- Message box -->
        <div class="auth-message" id="authMessage"></div>

        <!-- SIGN IN FORM -->
        <div class="auth-form active" id="signinForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signinEmail" placeholder="your@email.com">
                <div class="field-error" id="signinEmailError">Please enter a valid email</div>
            </div>
            <!-- Sign in password field -->
<div class="form-group">
    <label>Password</label>
    <div style="position:relative;">
        <input type="password" id="signinPassword" placeholder="Enter your password">
        <button type="button" onclick="togglePassword('signinPassword', this)"
            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;font-size:1.1rem;">
            👁
        </button>
    </div>
    <div class="field-error" id="signinPasswordError">Password is required</div>
</div>

<!-- Sign up password field -->
<div class="form-group">
    <label>Password</label>
    <div style="position:relative;">
        <input type="password" id="signupPassword" placeholder="Minimum 6 characters">
        <button type="button" onclick="togglePassword('signupPassword', this)"
            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;font-size:1.1rem;">
            👁
        </button>
    </div>
    <div class="field-error" id="signupPasswordError">Password must be at least 6 characters</div>
</div>

<!-- Sign up confirm password field -->
<div class="form-group">
    <label>Confirm Password</label>
    <div style="position:relative;">
        <input type="password" id="signupConfirm" placeholder="Repeat your password">
        <button type="button" onclick="togglePassword('signupConfirm', this)"
            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;font-size:1.1rem;">
            👁
        </button>
    </div>
    <div class="field-error" id="signupConfirmError">Passwords do not match</div>
</div>
            <div class="forgot-link">
                <a href="#">Forgot password?</a>
            </div>
            <button class="submit-btn" id="signinBtn" onclick="handleSignIn()">
                Sign In
            </button>
        </div>

        <!-- SIGN UP FORM -->
        <div class="auth-form" id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Your full name">
                <div class="field-error" id="signupNameError">Name is required</div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" placeholder="your@email.com">
                <div class="field-error" id="signupEmailError">Please enter a valid email</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Minimum 6 characters">
                <div class="field-error" id="signupPasswordError">Password must be at least 6 characters</div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="Repeat your password">
                <div class="field-error" id="signupConfirmError">Passwords do not match</div>
            </div>
            <button class="submit-btn" id="signupBtn" onclick="handleSignUp()">
                Create Account
            </button>
        </div>

    </div>
</div>

<script>
const API = 'http://localhost:5000/api/auth';

// ── TAB SWITCHING ─────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

    if (tab === 'signin') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('signinForm').classList.add('active');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('signupForm').classList.add('active');
    }

    hideMessage();
}

// ── SHOW MESSAGE ──────────────────────────────────
function showMessage(text, type) {
    const msg = document.getElementById('authMessage');
    msg.textContent = text;
    msg.className = 'auth-message ' + type;
}

function hideMessage() {
    document.getElementById('authMessage').className = 'auth-message';
}

// ── VALIDATION ────────────────────────────────────
function showError(fieldId, errorId) {
    document.getElementById(fieldId).classList.add('error');
    document.getElementById(errorId).classList.add('show');
}

function clearErrors() {
    document.querySelectorAll('.form-group input').forEach(i => i.classList.remove('error'));
    document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));
}

// ── SIGN IN ───────────────────────────────────────
async function handleSignIn() {
    clearErrors();
    hideMessage();

    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;

    // Validate
    let valid = true;
    if (!email || !email.includes('@')) {
        showError('signinEmail', 'signinEmailError');
        valid = false;
    }
    if (!password) {
        showError('signinPassword', 'signinPasswordError');
        valid = false;
    }
    if (!valid) return;

    // Disable button while loading
    const btn = document.getElementById('signinBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
        const response = await fetch(`${API}/signin`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            // Save token and user info
            localStorage.setItem('jiguToken', data.token);
            localStorage.setItem('jiguUser', JSON.stringify(data.user));

            showMessage('Signed in successfully! Redirecting...', 'success');

            // Go to profile after 1 second
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1000);
        } else {
            showMessage(data.message || 'Sign in failed', 'error');
        }

    } catch (error) {
        showMessage('Cannot connect to server. Make sure backend is running.', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Sign In';
}

// ── SIGN UP ───────────────────────────────────────
async function handleSignUp() {
    clearErrors();
    hideMessage();

    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;

    // Validate
    let valid = true;
    if (!name) { showError('signupName', 'signupNameError'); valid = false; }
    if (!email || !email.includes('@')) { showError('signupEmail', 'signupEmailError'); valid = false; }
    if (password.length < 6) { showError('signupPassword', 'signupPasswordError'); valid = false; }
    if (password !== confirm) { showError('signupConfirm', 'signupConfirmError'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
        const response = await fetch(`${API}/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('jiguToken', data.token);
            localStorage.setItem('jiguUser', JSON.stringify(data.user));

            showMessage('Account created! Redirecting...', 'success');

            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1000);
        } else {
            showMessage(data.message || 'Sign up failed', 'error');
        }

    } catch (error) {
        showMessage('Cannot connect to server. Make sure backend is running.', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Create Account';
}

// ── CHECK IF ALREADY LOGGED IN ───────────────────
const existingToken = localStorage.getItem('jiguToken');
if (existingToken) {
    window.location.href = 'profile.html';
}
function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁';
    }
}
</script>
</body>
</html>
